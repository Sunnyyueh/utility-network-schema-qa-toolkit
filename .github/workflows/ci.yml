name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and development tools
        run: python -m pip install --upgrade pip && python -m pip install '.[dev]'
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test with branch coverage
        run: pytest --cov=un_schema_qa --cov-report=term-missing --cov-fail-under=90
      - name: Build distributions
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install '.[dev]'
      - name: Run tests
        run: pytest
